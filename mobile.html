<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ハンサミング モバイル（LINE担当）</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--ink:#1f2937;--mute:#6b7280;--line:#eceef1;--bg:#f5f6f8;--brand:#2563eb;--bad:#dc2626;--warn:#d97706;--ok:#16a34a;--card:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans CJK JP',sans-serif;background:#d8dadf;color:var(--ink);line-height:1.55}
/* phone frame (PCでは中央に電話幅) */
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.12)}
.appbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:54px}
.appbar .back{font-size:20px;color:var(--brand);cursor:pointer;line-height:1}
.appbar .title{font-size:16px;font-weight:700;flex:1}
.appbar .sub{font-size:11px;color:var(--mute);font-weight:400}
.appbar .av{width:30px;height:30px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 86px}
.bottomnav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:20}
.bottomnav button{background:none;border:none;padding:8px 0 10px;font-size:10px;color:var(--mute);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bottomnav button .ic{font-size:20px;line-height:1}
.bottomnav button.on{color:var(--brand);font-weight:700}
.greet{font-size:13px;color:var(--mute);margin-bottom:10px}
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.pill{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pill .n{font-weight:800}
.pill.urgent .n{color:var(--bad)} .pill.important .n{color:var(--warn)} .pill.normal .n{color:var(--brand)}
.pill.on .n{color:#fff}
.seclabel{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--mute);margin:14px 2px 8px}
.uc{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;border:1px solid var(--line)}
.uc:active{background:#f1f5f9}
.uc .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.uc .dot.urgent{background:var(--bad)} .uc .dot.important{background:var(--warn)} .uc .dot.normal{background:var(--brand)} .uc .dot.watch{background:#cbd5e1}
.uc .mid{flex:1;min-width:0}
.uc .nm{font-size:15px;font-weight:700}
.uc .meta{font-size:11px;color:var(--mute);margin-top:1px}
.uc .snip{font-size:12px;color:#475569;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uc .right{flex:0 0 auto;text-align:right}
.uc .days{font-size:11px;color:var(--mute)}
.sig{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px}
.sig.high{background:#fee2e2;color:#991b1b} .sig.medium{background:#fef3c7;color:#92400e}
.watchbar{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--mute);text-align:center}
/* detail */
.dhead{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--line)}
.dhead .nm{font-size:18px;font-weight:800}
.dhead .tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;background:#eef2ff;color:#4338ca;border-radius:8px;padding:3px 9px}
.tag.warn{background:#fef3c7;color:#92400e}.tag.bad{background:#fee2e2;color:#991b1b}
.block{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--line)}
.block h3{font-size:13px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.bub{background:#f5f6f8;border-radius:12px;padding:9px 12px;margin-bottom:7px;font-size:13px}
.bub .d{font-size:10px;color:var(--mute);margin-bottom:2px}
.bub.bad{background:#fef2f2}.bub.warn{background:#fffbeb}
.alert{border-left:3px solid var(--bad);background:#fef2f2;border-radius:8px;padding:8px 11px;margin-bottom:7px;font-size:12px}
.alert .t{font-weight:700;color:#991b1b}
.ai{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #dbeafe;border-radius:12px;padding:12px;font-size:13.5px;line-height:1.7;margin-bottom:10px}
.ai .lab{font-size:10px;font-weight:700;color:#4338ca;letter-spacing:.5px;margin-bottom:5px}
.tones{display:flex;gap:6px;overflow-x:auto;margin:10px 0}
.tone{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer}
.tone.on{background:var(--brand);color:#fff;border-color:var(--brand)}
textarea{width:100%;min-height:96px;border:1px solid #cbd5e1;border-radius:12px;padding:11px;font-size:14px;font-family:inherit;resize:vertical}
.btn{display:block;width:100%;background:var(--brand);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn:active{filter:brightness(.94)}
.btn.sec{background:#fff;color:var(--brand);border:1px solid #cbd5e1}
.row2{display:flex;gap:8px}.row2 .btn{margin-top:0}
.know{border-left:3px solid #f59e0b;background:#fffbeb;border-radius:8px;padding:9px 11px;margin-bottom:7px}
.know .t{font-size:13px;font-weight:700}.know .b{font-size:12px;color:#475569;margin-top:2px}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:.25s;z-index:40;pointer-events:none}
.toast.show{opacity:1}
.muted{color:var(--mute);font-size:12px}
.center{text-align:center;color:var(--mute);padding:30px 0;font-size:13px}
.rolechip{background:#eef2ff;color:#3730a3;border:none;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-right:6px}
.kpi3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi3 .k{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center}
.kpi3 .k .v{font-size:20px;font-weight:800;line-height:1.1}.kpi3 .k .l{font-size:10px;color:var(--mute);margin-top:2px}
.scorerow{display:grid;grid-template-columns:96px 1fr 30px;gap:8px;align-items:center;font-size:12px;margin:6px 0}
.sb{background:#e5e7eb;height:7px;border-radius:4px;overflow:hidden}.sb>div{height:100%;background:var(--brand)}
.stage{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.stage.done{background:#dcfce7;color:#166534}.stage.review{background:#fef3c7;color:#92400e}.stage.prep{background:#f1f5f9;color:#475569}
.seccard{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.sechead{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-weight:700;font-size:14px;cursor:pointer}
.sechead .cnt{display:inline-block;background:#f1f5f9;color:#475569;border-radius:999px;padding:1px 8px;font-size:12px;margin-left:4px}
.chev{color:#94a3b8;font-size:13px}
.seclist{padding:2px 10px 8px}
.notice{padding:10px 14px;border-top:1px solid var(--line)}
.notice.un{background:#f3f9ff}
.notice .nh{font-size:13px;font-weight:600}
.notice .nmeta{font-size:11px;color:var(--mute);margin-top:1px}
.notice .nb{font-size:12px;color:#475569;margin-top:4px;line-height:1.5}
</style></head><body>
<div class="phone">
  <div class="appbar" id="appbar"></div>
  <div class="scroll" id="app"><div class="center">読み込み中…</div></div>
  <div class="bottomnav" id="nav"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://shmsyuohusfjjbopqokr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobXN5dW9odXNmampib3Bxb2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDg2MjQsImV4cCI6MjA5MDEyNDYyNH0.q_FOFOHm_7KN8rsTBPGadZWCWB4Xn-ya3I7_fAUQ1cs';
let sb=null;
const DEMO={'LINE担当':{id:'88a3d1a9-53ae-4de1-9ac6-23800e2b58d5',name:'高橋 優子'},'統括コーチ':{id:'5cbcf5ed-7dc2-4114-b071-0a1134b1c738',name:'正村 ゆり'},'面談担当':{id:'b2a36891-0eee-4dd6-afdf-06f2f023534b',name:'田中 美咲'}};
const LINE_COACHES=[{id:'88a3d1a9-53ae-4de1-9ac6-23800e2b58d5',name:'高橋 優子'},{id:'6b38ac1c-a0ea-487d-b81a-4f61a0965f05',name:'佐藤 健太'}];
const NAV={
 'LINE担当':[['today','📋','今日'],['board','👥','担当'],['knowledge','💡','知見'],['me','🙂','自分']],
 '統括コーチ':[['suphome','🛡','ホーム'],['supcoaches','👥','コーチ'],['knowledge','💡','知見'],['me','🙂','自分']],
 '面談担当':[['ivlist','🗓','面談'],['knowledge','💡','知見'],['me','🙂','自分']]
};
const ROLECHIP={'LINE担当':'🟦 LINE','統括コーチ':'🛡 統括','面談担当':'🗓 面談'};
const SIG={willpower_word_spike:'意志力ワード急増',food_detail_drop:'食事詳細率低下',post_silence:'無投稿',char_count_decline:'文字数減少',sentiment_negative_surge:'ネガティブ急増',reply_unread:'未読'};
const SEGJP={urgent:'緊急',important:'重要',normal:'通常',watch:'静観'};
const TONES=[['empathy','共感'],['question','質問'],['suggestion','具体提案'],['praise','褒め']];
const esc=s=>s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const S={staff:null, role:null, roleEff:'LINE担当', me:null, coach:null, rows:[], filter:'all', sel:null, detail:null, tone:'empathy', caseType:'other', aiText:'', tab:'today', sup:null, iv:null, ivk:null};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

async function init(){
  S.staff=null;
  try{
    const sess=await Promise.race([sb.auth.getSession(), new Promise(r=>setTimeout(()=>r({data:{session:null}}),2500))]);
    const session=sess&&sess.data&&sess.data.session;
    if(session){ const {data:st}=await sb.from('staff').select('*').eq('email',session.user.email).maybeSingle(); if(st) S.staff=st; }
  }catch(e){}
  S.role = (S.staff && ['LINE担当','統括コーチ','面談担当'].includes(S.staff.role)) ? S.staff.role : null;
  await enterRole(S.role || 'LINE担当');
}
function defaultTab(role){ return role==='統括コーチ'?'suphome':role==='面談担当'?'ivlist':'today'; }
async function enterRole(role){
  S.roleEff=role; S.sel=null; S.filter='all';
  S.me = (S.staff && S.staff.role===role) ? {id:S.staff.id,name:S.staff.name} : DEMO[role];
  try{
    if(role==='LINE担当'){ S.coach={id:S.me.id,name:S.me.name}; await loadCheckin(); try{ const {data}=await sb.rpc('get_coach_notices',{p_staff:S.me.id}); S.notices=data||[]; }catch(e){ S.notices=[]; } }
    else if(role==='統括コーチ'){ await loadSup(); }
    else if(role==='面談担当'){ await loadIv(); }
  }catch(e){}
  renderNav();
  go(defaultTab(role));
}
function cycleRole(){ const order=['LINE担当','統括コーチ','面談担当']; const i=order.indexOf(S.roleEff); enterRole(order[(i+1)%order.length]); }
function renderNav(){
  const items=NAV[S.roleEff]||NAV['LINE担当'];
  document.getElementById('nav').innerHTML=items.map(([t,ic,l])=>`<button data-t="${t}"><span class="ic">${ic}</span>${l}</button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.t));
}
// ============ 統括コーチ ============
async function loadSup(){
  let cards=[];
  try{ const {data}=await sb.rpc('list_knowledge_cards',{p_sort:'new',p_limit:100}); cards=data||[]; }catch(e){}
  const coaches=[];
  for(const c of LINE_COACHES){
    try{ const {data}=await sb.rpc('line_checkin',{coach:c.id}); const rows=data||[];
      coaches.push({id:c.id,name:c.name,rows,total:rows.length,urgent:rows.filter(r=>r.segment==='urgent').length,important:rows.filter(r=>r.segment==='important').length});
    }catch(e){ coaches.push({id:c.id,name:c.name,rows:[],total:0,urgent:0,important:0}); }
  }
  S.sup={cards,coaches};
}
function renderSupHome(){
  setBar('統括コーチ ホーム','本部⇔現場の支援役',null);
  const cards=(S.sup&&S.sup.cards)||[]; const peer=cards.filter(c=>c.status==='peer'); const official=cards.filter(c=>c.status==='official'); const recent=cards.slice(0,4);
  const coaches=(S.sup&&S.sup.coaches)||[];
  const triage=peer.slice(0,4).map(c=>`<div class="uc" onclick="supOpenCard('${c.card_id}')"><div class="dot important"></div><div class="mid"><div class="nm" style="font-size:14px">${esc(c.title)}</div><div class="meta">✍${esc(c.author_name||'—')} ・ 👍${c.total||0} ・ 公式化待ち</div></div><div class="right"><div style="font-size:18px;color:#cbd5e1">›</div></div></div>`).join('')||'<div class="watchbar">公式化待ちはありません</div>';
  const voice=recent.map(c=>`<div class="bub"><div class="d">${esc(c.author_name||'—')}</div>${esc(c.title)}</div>`).join('')||'<div class="muted">まだありません</div>';
  document.getElementById('app').innerHTML=`
    <div class="greet">${esc(S.me&&S.me.name||'')}さん（統括コーチ）。評価ではなく、現場の支援と良い対応例の横展開が役目です。</div>
    <div class="kpi3">
      <div class="k"><div class="v" style="color:var(--warn)">${peer.length}</div><div class="l">公式化待ち</div></div>
      <div class="k"><div class="v" style="color:var(--ok)">${official.length}</div><div class="l">公式化済</div></div>
      <div class="k"><div class="v">${coaches.length}</div><div class="l">担当コーチ</div></div>
    </div>
    <div class="block"><h3>🛡 公式化トリアージ</h3>${triage}<button class="btn sec" style="margin-top:8px" onclick="go('knowledge')">知見フィードで公式化 →</button></div>
    <div class="block"><h3>👥 担当コーチの状況</h3>${coaches.map((c,i)=>`<div class="uc" onclick="supOpenCoach(${i})"><div class="mid"><div class="nm" style="font-size:14px">${esc(c.name)}</div><div class="meta">担当${c.total}名 ・ 🚨${c.urgent} 🟡${c.important}</div></div>${c.urgent>=2?'<span class="sig high">要相談</span>':'<span class="sig" style="background:#dcfce7;color:#166534">適正</span>'}<div style="font-size:18px;color:#cbd5e1;margin-left:6px">›</div></div>`).join('')||'<div class="muted">—</div>'}</div>
    <div class="block"><h3>📣 現場の声 → 本部</h3>${voice}</div>
    <div class="block"><h3>💬 相談（Teams・プロト）</h3><div class="bub warn">「LINE対応人数を5名減らしたい」<div class="d">高橋さん</div></div><div class="muted" style="margin-top:6px">相談の一次窓口はTeams。ここは記録・対応例化を補助。</div></div>`;
}
function renderSupCoaches(){
  const coaches=(S.sup&&S.sup.coaches)||[];
  setBar('担当コーチ',`${coaches.length}名`,null);
  document.getElementById('app').innerHTML= coaches.map((c,i)=>`<div class="block" onclick="supOpenCoach(${i})" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="nm" style="font-weight:700">${esc(c.name)} ›</div><div class="muted">担当 ${c.total} 名</div></div><div style="text-align:right"><span class="sig high">🚨${c.urgent}</span> <span class="sig medium">🟡${c.important}</span></div></div></div>`).join('')||'<div class="center">コーチがいません</div>';
}
function supOpenCoach(i){ S.supCoach=i; renderSupCoach(); }
function renderSupCoach(){
  const co=((S.sup&&S.sup.coaches)||[])[S.supCoach];
  if(!co){ setBar('コーチ','','supBack()'); document.getElementById('app').innerHTML='<div class="center">コーチが見つかりません</div>'; return; }
  setBar(co.name+' の担当','対象者は匿名表示',"S.supCoach=null;render()");
  const rows=co.rows||[];
  const seg=k=>rows.filter(r=>r.segment===k);
  const urg=seg('urgent'),imp=seg('important');
  const row=r=>`<div class="uc"><div class="dot ${r.segment}"></div><div class="mid"><div class="nm" style="font-size:14px">${esc(r.line_id||'匿名')}</div><div class="meta">担当${r.assigned_days??'—'}日 ・ ${esc(r.continuation||'—')}${r.unanswered?' ・ 未返信':''}</div>${r.top_signal?`<span class="sig ${r.top_severity}">${SIG[r.top_signal]||r.top_signal}</span>`:''}</div></div>`;
  document.getElementById('app').innerHTML=`
    <div class="kpi3">
      <div class="k"><div class="v">${co.total}</div><div class="l">担当</div></div>
      <div class="k"><div class="v" style="color:var(--bad)">${urg.length}</div><div class="l">🚨緊急</div></div>
      <div class="k"><div class="v" style="color:var(--warn)">${imp.length}</div><div class="l">🟡重要</div></div>
    </div>
    ${urg.length?`<div class="seclabel">🚨 緊急</div>${urg.map(row).join('')}`:''}
    ${imp.length?`<div class="seclabel">🟡 重要</div>${imp.map(row).join('')}`:''}
    ${(!urg.length&&!imp.length)?'<div class="center">対応が必要な対象者はいません</div>':''}
    <div class="block" style="background:#eef2ff;border-color:#c7d2fe;font-size:12px;color:#3730a3">🛡 対象者は匿名（line_id）表示です。統括コーチはコーチ単位で支援し、個人特定情報は閲覧しません（粒度設計：コーチ=META／対象者=ANON）。困りごとはこのコーチの相談として拾い、対応例の横展開につなげます。</div>`;
}
function supOpenCard(id){ S.supSel=id; renderSupCard(); }
function supBack(){ S.supSel=null; render(); }
async function knSetStatusM(id,status){
  try{ const {error}=await sb.from('knowledge_cards').update({status}).eq('id',id); if(error) throw error;
    toast(status==='official'?'公式化しました ✓':status==='reviewed'?'QC確認済にしました':'仲間内に戻しました');
  }catch(e){ toast('更新に失敗: '+(e.message||e)); return; }
  await loadSup(); S.supSel=null; go('suphome');
}
function renderSupCard(){
  const c=((S.sup&&S.sup.cards)||[]).find(x=>x.card_id===S.supSel);
  if(!c){ setBar('知見カード','','supBack()'); document.getElementById('app').innerHTML='<div class="center">カードが見つかりません</div>'; return; }
  setBar(c.title||'知見カード','公式化レビュー','supBack()');
  const tags=(c.tags||[]).map(t=>`<span class="tag">#${esc(t)}</span>`).join(' ');
  const badge=c.status==='official'?'<span class="sig" style="background:#dcfce7;color:#166534">公式</span>':c.status==='reviewed'?'<span class="sig" style="background:#dbeafe;color:#1e40af">QC確認済</span>':'<span class="sig" style="background:#f1f5f9;color:#475569">仲間内</span>';
  document.getElementById('app').innerHTML=`
    <div class="block">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px"><div style="font-weight:700;font-size:16px">${esc(c.title)}</div>${badge}</div>
      ${c.situation?`<div class="muted" style="margin-top:6px">🟡 ${esc(c.situation)}</div>`:''}
      <div style="font-size:14px;line-height:1.7;margin-top:8px;white-space:pre-wrap">${esc(c.body||'')}</div>

const SWAPS=['揚げ物を焼き物や魚にすると約200kcal減','ご飯を半分にすると約120kcal減','ドレッシングをノンオイルにすると約120kcal減','ビールを糖質オフに変えると約80kcal減','間食のチョコを数粒に絞ると約100kcal減'];
function pickSwap(d){
  const t=((d.posts&&d.posts[0]&&d.posts[0].text_content)||'');
  if(/ラーメン|外食|接待|揚げ|フライ|カツ/.test(t)) return '次の外食は揚げ物を焼き魚に変えると約200kcal減らせます';
  if(/ラテ|コーヒー|ジュース|飲み|ビール|酒/.test(t)) return '飲み物をブラックやお茶に変えると約100kcal減らせます';
  if(/ご飯|ごはん|丼|麺|パスタ|パン/.test(t)) return 'ご飯やパンを少しだけ減らすと約120kcal減らせます';
  return SWAPS[t.length % SWAPS.length];
}
// 太陽アプローチ(全肯定)＋具体の置き換え(−kcal)。トーン×ケース類型で再生成。励まし単独にしない。
function aiDraft(r,d,tone,caseType){
  const nm=r.name||''; const swap=pickSwap(d||{});
  const open={
    empathy:`${nm}さん、お疲れさまです。正直に教えてくださってありがとうございます。`,
    question:`${nm}さん、いつも報告ありがとうございます。状況をもう少しだけ教えてください。`,
    suggestion:`${nm}さん、ご報告ありがとうございます。すぐ試せる一手をひとつだけ。`,
    praise:`${nm}さん、続けられていること自体が本当にすごいです。`
  }[tone]||`${nm}さん、いつもありがとうございます。`;
  const core={
    weekday:`平日はしっかり意識できていますね。崩れやすい週末や外食だけ、ピンポイントで整えれば十分です。`,
    undereat:`実は食べなさすぎも停滞の一因です。抜くより、軽くでも口にして食事の波を作りましょう。`,
    expectation:`体重は急がないのがコツです。時間をかけて付いた脂肪はゆっくり落ちていくもの。今のペースで大丈夫です。`,
    other:`完璧じゃなくて大丈夫です。続いていること自体が前進です。`
  }[caseType]||'';
  const close={
    empathy:`まずは一行だけ、今日の食事を教えてください。例えば${swap}。`,
    question:`最近「これは続けやすい」と感じた工夫はありますか？ちなみに${swap}。`,
    suggestion:`${swap}。これだけでOKです。`,
    praise:`その調子で、もし余裕があれば${swap}。`
  }[tone]||`${swap}。`;
  return [open,core,close].filter(Boolean).join('\n');
}

      <div class="ai"><div class="lab">AI下書き（太陽アプローチ＋具体の置き換え ／ プロト：本実装でClaude接続）</div>${aiHtml}</div>
      <div class="row2"><button class="btn" onclick="adopt()">この案を使う</button><button class="btn sec" onclick="clearText()">自分で書く</button></div>
      <textarea id="cmt" placeholder="コメント（編集してスマカリに貼り付け）">${esc(S._draft||'')}</textarea>
      ${know?`<h3 style="margin-top:12px">💡 現場の知見（似たケース）</h3>${know}`:''}
      <button class="btn" onclick="copyComment()">📋 コピー（スマカリに貼り付けて送信）</button>
      <div class="muted" style="margin-top:6px">送信はスマカリの返信画面で行ってください（トーク画面だと記録が残りません）。</div>
    </div>`;
}
const CASES=[['weekday','平日意識'],['undereat','栄養不足'],['expectation','期待値高'],['other','その他']];
function syncDraft(){ const t=document.getElementById('cmt'); if(t) S._draft=t.value; }
function setTone(v){ syncDraft(); S.tone=v; S.aiText=aiDraft(S.sel,S.detail,S.tone,S.caseType); renderUser(); }
function setCase(v){ syncDraft(); S.caseType=v; S.aiText=aiDraft(S.sel,S.detail,S.tone,S.caseType); renderUser(); }
function adopt(){ S._draft=S.aiText; const t=document.getElementById('cmt'); if(t)t.value=S.aiText; S._adopted=true; }
function clearText(){ S._draft=''; const t=document.getElementById('cmt'); if(t)t.value=''; S._adopted=false; }
// 送信は我々のスコープ外（スマカリで送信）。ここは「下書きをコピー＋利用ログ記録」まで。
async function copyComment(){
  syncDraft(); const text=(S._draft||'').trim();
  if(!text){ toast('コメントを入力してください'); return; }
  try{ await navigator.clipboard.writeText(text); }catch(e){}
  let adoption='no_proposal';
  if(S.aiText){ adoption = text===S.aiText ? 'adopted_as_is' : (S._adopted ? 'edited' : 'rejected'); }
  const latest=(S.detail&&S.detail.posts[0]&&S.detail.posts[0].id)||null;
  // coach_comments は「下書き利用ログ」（AI採用率などの支援指標。送信記録ではない）
  try{ await sb.from('coach_comments').insert({customer_id:S.sel.customer_id, staff_id:S.coach&&S.coach.id, daily_report_id:latest, tone:S.tone, text_content:text, ai_proposed_text:S.aiText||null, ai_adoption:adoption, sent_at:null}); }catch(e){}
  toast('コピーしました。スマカリに貼り付けて送信してください');
}
function knPg(s){ const t=(s||'').replace(/[、。？！?!,.「」　]/g,' ').split(/\s+/).filter(x=>x.length>=2); return t.length?t.join(' OR '):s; }
function knCardHtml(c){ return `<div class="block"><h3>${esc(c.title)}</h3>${c.situation?`<div class="muted" style="margin-bottom:4px">🟡 ${esc(c.situation)}</div>`:''}<div style="font-size:13px;color:#334155;white-space:pre-wrap">${esc((c.body||'').slice(0,140))}${(c.body||'').length>140?'…':''}</div>${c.outcome?`<div style="font-size:12px;color:#166534;margin-top:5px;background:#f0fdf4;border-radius:8px;padding:6px 9px">→ どう変わった：${esc(c.outcome)}</div>`:''}<div class="muted" style="margin-top:6px">✍ ${esc(c.author_name||'—')} ・ 👍${c.helpful||0} ✅${c.used||0}${c.status==='official'?' ・ <b style="color:#166534">公式</b>':''}</div></div>`; }
function knSearch(){ const el=document.getElementById('knq'); S.knQuery=(el&&el.value||'').trim(); renderKnowledge(); }
function renderKnowledge(){
  setBar('知見・マニュアル検索','自然文でOK',null);
  const q=S.knQuery||'';
  const head=`<div class="block">
    <div style="display:flex;gap:6px">
      <input id="knq" placeholder="例：痩せないと言われた時の返し方" value="${esc(q)}" style="flex:1;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;font-size:14px" onkeydown="if(event.key==='Enter')knSearch()">
      <button class="btn" style="width:auto;margin:0;padding:10px 14px" onclick="knSearch()">検索</button>
    </div>
    <div class="muted" style="margin-top:6px">マニュアル本文（全文検索＋AI回答）と、現場の知見をまとめて検索します。</div>
  </div>`;
  const app=document.getElementById('app');
  if(!q){
    app.innerHTML=head+'<div class="center">読み込み中…</div>';
    sb.rpc('list_knowledge_cards',{p_sort:'popular',p_limit:20}).then(({data})=>{
      if(S.tab!=='knowledge'||S.knQuery) return;
      const cards=(data||[]).map(knCardHtml).join('')||'<div class="center">まだ知見がありません</div>';
      app.innerHTML=head+`<div class="seclabel">💡 よく使われる現場の知見</div>`+cards;
    });
    return;
  }
  app.innerHTML=head+'<div class="center">検索中…（マニュアル＋現場の知見）</div>';
  Promise.all([
    sb.functions.invoke('manual-search',{body:{query:q, staff_id:S.me&&S.me.id}}).then(r=>r.data).catch(()=>null),
    sb.rpc('search_knowledge_cards',{pgroonga_query:knPg(q),match_count:3}).then(r=>r.data).catch(()=>[])
  ]).then(([man,cards])=>{
    if(S.knQuery!==q) return;
    let html=head;
    if(man && man.answer){ html+=`<div class="block"><h3>📖 マニュアル回答</h3><div style="font-size:14px;line-height:1.7;white-space:pre-wrap">${esc(man.answer)}</div></div>`; }
    const srcs=(man&&man.sources)||[];
    if(srcs.length){ html+=`<div class="block"><h3>出典（マニュアル）</h3>`+srcs.map(s=>`<div class="bub"><div class="d">${esc(s.heading_path||s.manual_title||'')}</div>${esc((s.snippet||'').slice(0,120))}…</div>`).join('')+`</div>`; }
    else if(man){ html+=`<div class="block"><div class="muted">該当するマニュアル箇所は見つかりませんでした。</div></div>`; }
    if(!man){ html+=`<div class="block"><div class="muted">マニュアル検索に接続できませんでした（デプロイ後に有効）。</div></div>`; }
    if((cards||[]).length){ html+=`<div class="seclabel">💡 現場の知見（似たケース）</div>`+cards.map(knCardHtml).join(''); }
    app.innerHTML=html;
  }).catch(e=>{ app.innerHTML=head+`<div class="center">エラー: ${esc(e&&e.message||e)}</div>`; });
}
async function renderMe(){
  setBar('自分','プロフィール',null);
  const name=esc(S.me&&S.me.name||''); const role=S.roleEff; let body='';
  if(role==='LINE担当'){
    let used=0,rate=0;
    try{ const today=new Date();today.setHours(0,0,0,0); const {data}=await sb.from('coach_comments').select('id,created_at,ai_adoption').eq('staff_id',S.me&&S.me.id); const arr=data||[]; used=arr.filter(c=>c.created_at&&new Date(c.created_at)>=today).length; const total=arr.length; const adopted=arr.filter(c=>c.ai_adoption==='adopted_as_is'||c.ai_adoption==='edited').length; rate= total? Math.round(adopted/total*100):0; }catch(e){}
    body=`<div class="block"><h3>今日の活動</h3><div style="font-size:13px">下書きの利用（コピー, 今日）：<b>${used}</b> 件<br>AI下書き 採用率（累計）：<b>${rate}</b>%</div><div class="muted" style="margin-top:6px">※ 送信はスマカリで（連携は取り込みのみ）。</div></div>
    <div class="block"><h3>返信ルール</h3><div style="font-size:13px;color:#475569">基本18h・最遅24h／平日7:00〜21:00／週末分は翌月曜。太陽アプローチ＋具体の一手。</div></div>`;
  } else if(role==='統括コーチ'){
    const cards=(S.sup&&S.sup.cards)||[]; const peer=cards.filter(c=>c.status==='peer').length; const official=cards.filter(c=>c.status==='official').length; const cc=((S.sup&&S.sup.coaches)||[]).length;
    body=`<div class="block"><h3>統括サマリー</h3><div style="font-size:13px">公式化待ち：<b>${peer}</b> 件 ／ 公式化済：<b>${official}</b> 件 ／ 担当コーチ：<b>${cc}</b> 名</div><div class="muted" style="margin-top:6px">評価者ではなくサポート役。良い対応例の横展開が役目。</div></div>`;
  } else {
    const list=(S.iv&&S.iv.list)||[]; const sc=list.filter(r=>r.overall_score!=null); const avg=sc.length?Math.round(sc.reduce((s,r)=>s+Number(r.overall_score),0)/sc.length):'—';
    body=`<div class="block"><h3>面談サマリー</h3><div style="font-size:13px">担当面談：<b>${list.length}</b> 件 ／ 平均総合スコア：<b>${avg}</b></div><div class="muted" style="margin-top:6px">6軸はAIの客観評価。所見をレビューして確定。</div></div>`;
  }
  document.getElementById('app').innerHTML=`<div class="block"><h3>🙂 ${name}（${esc(role)}）</h3><div class="muted">右上の役割チップで他役割をプレビューできます（プロト）。</div></div>${body}`;
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
</script>
</body></html>
